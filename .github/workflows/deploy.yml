name: EC2 CI/CD Deploy (Node.js + PM2 + Nginx)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2 Server
    runs-on: ubuntu-latest

    steps:
      # 1. Setup SSH
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # 2. Check EC2 Connection
      - name: Test EC2 Connection
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo '✅ EC2 SSH Connection Successful'"

      # 3. Deploy Full Stack on EC2
      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "=============================="
          echo "Updating System"
          echo "=============================="
          sudo apt update -y

          echo "=============================="
          echo "Installing Node.js (if not installed)"
          echo "=============================="
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt install -y nodejs
          fi

          echo "=============================="
          echo "Installing PM2"
          echo "=============================="
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm install -g pm2
          fi

          echo "=============================="
          echo "Installing Nginx"
          echo "=============================="
          if ! command -v nginx >/dev/null 2>&1; then
            sudo apt install nginx -y
          fi

          echo "=============================="
          echo "Cloning / Updating Project"
          echo "=============================="

          APP_DIR="/var/www/ostad-app"

          if [ ! -d "$APP_DIR" ]; then
            sudo mkdir -p $APP_DIR
            sudo chown -R $USER:$USER $APP_DIR
            git clone https://github.com/RashiqulRony/ostad-module3-cicd.git $APP_DIR
          else
            cd $APP_DIR
            git pull origin main
          fi

          cd $APP_DIR

          echo "=============================="
          echo "Installing Dependencies"
          echo "=============================="
          npm install

          echo "=============================="
          echo "Starting App with PM2 on Port 5000"
          echo "=============================="

          export PORT=5000

          if pm2 describe ostad-app >/dev/null 2>&1; then
            pm2 restart ostad-app
          else
            pm2 start app.js --name ostad-app --env production
          fi

          pm2 save

          echo "=============================="
          echo "Configuring Nginx"
          echo "=============================="

          sudo bash -c 'cat > /etc/nginx/sites-available/ostad <<EOF
server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
}
EOF'

          sudo ln -sf /etc/nginx/sites-available/ostad /etc/nginx/sites-enabled/

          sudo rm -f /etc/nginx/sites-enabled/default || true

          sudo nginx -t
          sudo systemctl restart nginx
          sudo systemctl enable nginx

          echo "=============================="
          echo "Deployment Completed Successfully"
          echo "=============================="

          EOF

      # 4. Cleanup SSH
      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/ec2_key
