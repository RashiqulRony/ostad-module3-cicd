name: EC2 Node.js Deploy (PM2 Only)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ================= SSH SETUP =================
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ================= TEST CONNECTION =================
      - name: Test EC2 Connection
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'EC2 Connected Successfully'"

      # ================= DEPLOY APP =================
      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          APP_DIR="/var/www/ostad-app"

          echo "===== System Update ====="
          sudo apt update -y

          echo "===== Install Node.js ====="
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt install -y nodejs
          fi

          echo "===== Install PM2 ====="
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm install -g pm2
          fi

          echo "===== Clone / Pull Project ====="
          if [ ! -d "$APP_DIR" ]; then
            git clone https://github.com/RashiqulRony/ostad-module3-cicd.git $APP_DIR
          else
            cd $APP_DIR
            git pull origin main
          fi

          cd $APP_DIR

          echo "===== Install Dependencies ====="
          npm install

          echo "===== Start App on Port 5000 ====="
          export PORT=5000

          if pm2 describe ostad-app >/dev/null 2>&1; then
            pm2 restart ostad-app
          else
            pm2 start app.js --name ostad-app
          fi

          pm2 save

          echo "===== DEPLOYMENT DONE ====="

          EOF

      # ================= CLEANUP =================
      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/ec2_key
