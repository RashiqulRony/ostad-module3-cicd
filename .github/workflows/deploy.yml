name: Build & Deploy Frontend to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ================= SSH SETUP =================
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ================= TEST CONNECTION =================
      - name: Test EC2 Connection
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'EC2 Connected'"

      # ================= DEPLOY =================
      - name: Build and Deploy
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          APP_DIR="/var/www/ostad-app"

          echo "=============================="
          echo "Update system"
          echo "=============================="
          sudo apt update -y

          echo "=============================="
          echo "Install Node.js if missing"
          echo "=============================="
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt install -y nodejs
          fi

          echo "=============================="
          echo "Create web directory"
          echo "=============================="
          sudo mkdir -p $APP_DIR
          sudo chown -R $USER:$USER $APP_DIR

          echo "=============================="
          echo "Clone / Pull Project"
          echo "=============================="

          if [ ! -d "project" ]; then
            git clone https://github.com/RashiqulRony/ostad-module3-cicd.git project
          else
            cd project
            git pull origin main
          fi

          cd project

          echo "=============================="
          echo "Install dependencies"
          echo "=============================="
          npm install

          echo "=============================="
          echo "Build project"
          echo "=============================="
          npm run build

          echo "=============================="
          echo "Deploy dist to /var/www"
          echo "=============================="

          rm -rf $APP_DIR/*
          cp -r dist/* $APP_DIR/

          echo "=============================="
          echo "Replace index.html if needed"
          echo "=============================="

          if [ -f "$APP_DIR/index.html" ]; then
            echo "index.html deployed successfully"
          else
            echo "ERROR: index.html not found in dist"
            exit 1
          fi

          echo "=============================="
          echo "DEPLOY DONE"
          echo "=============================="

          EOF

      # ================= CLEANUP =================
      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/ec2_key
