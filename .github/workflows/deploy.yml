name: Node.js CI/CD Deploy (PM2 Clean)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ================= SSH SETUP =================
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ================= TEST CONNECTION =================
      - name: Test EC2 Connection
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'EC2 Connected'"

      # ================= DEPLOY =================
      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          APP_DIR="/var/www/node-app"

          echo "=============================="
          echo "System Update"
          echo "=============================="
          sudo apt update -y

          echo "=============================="
          echo "Install Node.js if missing"
          echo "=============================="
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt install -y nodejs
          fi

          echo "=============================="
          echo "Install PM2 if missing"
          echo "=============================="
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm install -g pm2
          fi

          echo "=============================="
          echo "Clone / Update Project"
          echo "=============================="

          if [ ! -d "$APP_DIR" ]; then
            git clone https://github.com/RashiqulRony/ostad-module3-cicd.git $APP_DIR
          else
            cd $APP_DIR
            git pull origin main
          fi

          cd $APP_DIR

          echo "=============================="
          echo "Install Packages"
          echo "=============================="
          npm install

          echo "=============================="
          echo "Run Tests"
          echo "=============================="
          npm run check || true

          echo "=============================="
          echo "Cleanup PM2 Process"
          echo "=============================="
          pm2 delete node-app || true

          echo "=============================="
          echo "Start Application"
          echo "=============================="
          pm2 start "./src/server.js" --name node-app

          echo "=============================="
          echo "Save PM2 Process"
          echo "=============================="
          pm2 save

          echo "=============================="
          echo "DEPLOY SUCCESS"
          echo "=============================="

          EOF

      # ================= CLEANUP =================
      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/ec2_key
