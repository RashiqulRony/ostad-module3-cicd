name: EC2 Node.js Auto Deploy (Fixed PM2)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ================= SSH SETUP =================
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ================= TEST CONNECTION =================
      - name: Test EC2 Connection
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'EC2 Connected'"

      # ================= DEPLOY =================
      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          APP_DIR="/var/www/ostad-app"

          echo "===== SYSTEM UPDATE ====="
          sudo apt update -y

          echo "===== NODE INSTALL CHECK ====="
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt install -y nodejs
          fi

          echo "===== PM2 INSTALL CHECK ====="
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm install -g pm2
          fi

          echo "===== CLONE / UPDATE PROJECT ====="
          if [ ! -d "$APP_DIR" ]; then
            git clone https://github.com/RashiqulRony/ostad-module3-cicd.git $APP_DIR
          else
            cd $APP_DIR
            git pull origin main
          fi

          cd $APP_DIR

          echo "===== INSTALL DEPENDENCIES ====="
          npm install

          echo "===== START APP ON PORT 5000 ====="
          export PORT=5000

          # Auto detect entry file
          APP_FILE=$(ls | grep -E "app.js|server.js|index.js" | head -n 1)

          if [ -z "$APP_FILE" ]; then
            echo "❌ ERROR: No entry file found (app.js/server.js/index.js missing)"
            exit 1
          fi

          echo "🚀 Starting: $APP_FILE"

          if pm2 describe ostad-app >/dev/null 2>&1; then
            pm2 restart ostad-app
          else
            pm2 start $APP_FILE --name ostad-app
          fi

          pm2 save

          echo "===== DEPLOY SUCCESS ====="

          EOF

      # ================= CLEANUP =================
      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/ec2_key
